services:
  - type: web
    name: dr-solution
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: ENVIRONMENT
        value: production
      - key: APP_VERSION
        value: 3.2.0
      - key: REQUIRE_USER_API_KEY
        value: true
      - key: GEMINI_MODEL
        value: gemini-3.1-flash-lite
      - key: VIDEO_MAX_SEGMENTS
        value: 12
      - key: VIDEO_MAX_PLAYLIST_ITEMS
        value: 3
      - key: VIDEO_ENABLE_SCENE_DETECTION
        value: true
      - key: VIDEO_ENABLE_WHISPER
        value: true
      - key: WHISPER_MODEL
        value: tiny
      - key: WHISPER_COMPUTE_TYPE
        value: int8
